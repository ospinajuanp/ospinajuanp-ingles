<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/icon.ico" />
    <link rel="apple-touch-icon" href="/icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="description" content="Aprende verbos en inglés con oraciones contextualizadas, conjugaciones y revelación progresiva." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Apply persisted theme before React mounts to avoid a flash of the
      // default theme. Mirrors the keys read by src/hooks/useTheme.js so
      // both sides stay in sync.
      (function () {
        try {
          var t = localStorage.getItem('ospinajuanp-ingles:theme');
          if (t) document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <title>Verbos Inglés — Aprende conjugando</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
